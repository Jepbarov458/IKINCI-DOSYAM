<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarhatTube - Reklamsız Deneyim</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: white; text-align: center; padding: 0; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #000; border-bottom: 2px solid red; }
        .logo { font-size: 24px; font-weight: bold; color: red; text-decoration: none; cursor: pointer; }
        .auth-buttons button, .logout-btn { background-color: red; color: white; border: none; padding: 8px 16px; margin-left: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .auth-buttons button:hover, .logout-btn:hover { background-color: darkred; }
        .content { padding: 50px 20px; }
        h1 { color: #fff; font-size: 32px; }
        p { color: #aaa; font-size: 18px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); }
        .modal-content { background-color: #222; margin: 15% auto; padding: 30px; border: 1px solid red; width: 300px; border-radius: 8px; text-align: left; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 10px; color: #aaa; font-size: 24px; cursor: pointer; }
        .close-btn:hover { color: white; }
        .modal-content h2 { margin-top: 0; color: red; text-align: center; }
        .modal-content input { width: 90%; padding: 10px; margin: 10px 0; background-color: #333; border: 1px solid #444; color: white; border-radius: 4px; }
        .modal-content button { width: 97%; padding: 10px; background-color: red; color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .modal-content button:hover { background-color: darkred; }
        
        /* Video Alanı Stilleri */
        #videoSayfasi { display: none; }
        .video-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .video-card { background-color: #222; width: 320px; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: left; }
        
        /* Gerçek Video Oynatıcı Çerçevesi */
        .video-box iframe { width: 100%; height: 180px; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- GİRİŞ YAPILMADAN ÖNCEKİ ANA SAYFA -->
    <div id="anaSayfa">
        <header class="header">
            <span class="logo" onclick="sayfaDegistir('ana')">FarhatTube</span>
            <div class="auth-buttons">
                <button onclick="paneliAc('giris')">Giriş Yap</button>
                <button onclick="paneliAc('kayit')">Kayıt Ol</button>
            </div>
        </header>
        <main class="content">
            <h1>FarhatTube'a Hoş Geldiniz!</h1>
            <p>Reklamsız ve kesintisiz video deneyiminin keyfini çıkarın.</p>
        </main>
    </div>

    <!-- GİRİŞ YAPILDIKTAN SONRAKİ VİDEO SAYFASI -->
    <div id="videoSayfasi">
        <header class="header">
            <span class="logo" onclick="sayfaDegistir('ana')">FarhatTube</span>
            <button class="logout-btn" onclick="sayfaDegistir('ana')">Çıkış Yap</button>
        </header>
        <main class="content">
            <h1 style="color: red;">Başarıyla Giriş Yapıldı 🎉</h1>
            <p>İzlemek istediğiniz videoyu seçin:</p>
            
            <div class="video-grid">
                <!-- 1. GERÇEK VİDEO KUTUSU -->
                <div class="video-card">
                    <div class="video-box">
                        <!-- Buraya örnek bir müzik videosu koydum -->
                        <iframe src="https://youtube.com" allowfullscreen></iframe>
                    </div>
                    <h3>Harika Şarkı Dinle</h3>
                    <p style="color:#888;">1.5M İzlenme • 2 gün önce</p>
                </div>

                <!-- 2. GERÇEK VİDEO KUTUSU -->
                <div class="video-card">
                    <div class="video-box">
                        <!-- Buraya örnek bir doğa videosu koydum -->
                        <iframe src="https://youtube.com" allowfullscreen></iframe>
                    </div>
                    <h3>Rahatlatıcı Doğa Videosu</h3>
                    <p style="color:#888;">500B İzlenme • 1 hafta önce</p>
                </div>
            </div>
        </main>
    </div>

    <!-- GİRİŞ PANELİ MODAL -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="paneliKapat()">&times;</span>
            <h2 id="modalBaslik">Giriş Yap</h2>
            <form onsubmit="formuGonder(event)">
                <input type="text" placeholder="Kullanıcı Adı" required>
                <input type="password" placeholder="Şifre" required>
                <button type="submit" id="submitButon">Giriş Yap</button>
            </form>
        </div>
    </div>

    <script>
        var modal = document.getElementById("authModal");
        var baslik = document.getElementById("modalBaslik");
        var buton = document.getElementById("submitButon");

        function paneliAc(tip) {
            modal.style.display = "block";
            if(tip === 'giris') {
                baslik.innerText = "Giriş Yap";
                buton.innerText = "Giriş Yap";
            } else {
                baslik.innerText = "Kayıt Ol";
                buton.innerText = "Kayıt Ol";
            }
        }

        function paneliKapat() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

        function sayfaDegistir(hedef) {
            if(hedef === 'video') {
                document.getElementById("anaSayfa").style.display = "none";
                document.getElementById("videoSayfasi").style.display = "block";
            } else {
                document.getElementById("anaSayfa").style.display = "block";
                document.getElementById("videoSayfasi").style.display = "none";
            }
        }

        function formuGonder(event) {
            event.preventDefault();
            paneliKapat();
            sayfaDegistir('video');
        }
    </script>

</body>
</html>
