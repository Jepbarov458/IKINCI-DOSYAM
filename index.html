<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarhatTube - Reklamsız Deneyim</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: #000;
            border-bottom: 2px solid red;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: red;
        }
        .auth-buttons button {
            background-color: red;
            color: white;
            border: none;
            padding: 8px 16px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
        .login-box {
            background-color: #222;
            max-width: 350px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
            display: none;
        }
        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background-color: #333;
            color: white;
            border: 1px solid #444;
        }
        .video-container {
            width: 80%;
            max-width: 800px;
            height: 450px;
            background-color: #222;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid red;
            border-radius: 10px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FARHATTUBE</div>
        <div class="auth-buttons" id="authArea">
            <button onclick="toggleLogin()">Giriş Yap</button>
            <button onclick="toggleLogin()">Kayıt Ol</button>
        </div>
    </div>

    <div class="login-box" id="loginBox">
        <h3>FarhatTube Giriş</h3>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" placeholder="Şifre">
        <button style="background-color:red; color:white; width:100%; padding:10px; border:none; cursor:pointer;" onclick="accountAction()">Onayla</button>
    </div>

    <h1>FarhatTube Platformuna Hoş Geldiniz</h1>
    <div class="video-container" id="videoWrapper">
        <p id="videoStatus">Video Oynatıcı Alanı (Lütfen Giriş Yapın)</p>
    </div>

    <script>
        function toggleLogin() {
            var box = document.getElementById('loginBox');
            if(box.style.display === 'block') {
                box.style.display = 'none';
            } else {
                box.style.display = 'block';
            }
        }

        function accountAction() {
            var user = document.getElementById('username').value;
            alert("Giriş Başarılı: " + user);
            document.getElementById('loginBox').style.display = 'none';
            
            // Giriş yapıldığı an buradaki video otomatik olarak çalışır
            document.getElementById('videoWrapper').innerHTML = '<iframe src="https://youtube.com" allowfullscreen></iframe>';
            document.getElementById('authArea').innerHTML = "<span style='color:green; font-weight:bold;'>Hoş geldin, " + user + "!</span>";
        }
    </script>
</body>
</html>
