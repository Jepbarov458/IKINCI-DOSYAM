<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarhatTube - Reklamsız Deneyim</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
            padding: 0;
            margin: 0;
        }
        /* Üst Menü (Header) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #000;
            border-bottom: 2px solid red;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: red;
            text-decoration: none;
        }
        .auth-buttons button {
            background-color: red;
            color: white;
            border: none;
            padding: 8px 16px;
            margin-left: 10px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        .auth-buttons button:hover {
            background-color: darkred;
        }
        /* Ana Gövde */
        .content {
            padding: 50px 20px;
        }
        h1 { color: #fff; font-size: 32px; }
        p { color: #aaa; font-size: 18px; }

        /* AÇILIR GİRİŞ PANELİ (MODAL) STİLLERİ */
        .modal {
            display: none; /* İlk başta gizli */
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
        }
        .modal-content {
            background-color: #222;
            margin: 15% auto;
            padding: 30px;
            border: 1px solid red;
            width: 300px;
            border-radius: 8px;
            text-align: left;
            position: relative;
        }
        .close-btn {
            position: absolute;
            right: 15px; top: 10px;
            color: #aaa; font-size: 24px; cursor: pointer;
        }
        .close-btn:hover { color: white; }
        .modal-content h2 { margin-top: 0; color: red; text-align: center; }
        .modal-content input {
            width: 90%; padding: 10px; margin: 10px 0;
            background-color: #333; border: 1px solid #444;
            color: white; border-radius: 4px;
        }
        .modal-content button {
            width: 97%; padding: 10px; background-color: red;
            color: white; border: none; font-weight: bold;
            border-radius: 4px; cursor: pointer; margin-top: 10px;
        }
        .modal-content button:hover { background-color: darkred; }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">FarhatTube</a>
        <div class="auth-buttons">
            <!-- Butonlar paneli açacak fonksiyonu tetikliyor -->
            <button onclick="paneliAc('giris')">Giriş Yap</button>
            <button onclick="paneliAc('kayit')">Kayıt Ol</button>
        </div>
    </header>

    <main class="content">
        <h1>FarhatTube'a Hoş Geldiniz!</h1>
        <p>Reklamsız ve kesintisiz video deneyiminin keyfini çıkarın.</p>
    </main>

    <!-- GERÇEK GİRİŞ / KAYIT PANELİ -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="paneliKapat()">&times;</span>
            <h2 id="modalBaslik">Giriş Yap</h2>
            <form onsubmit="formuGonder(event)">
                <input type="text" id="kullaniciAdi" placeholder="Kullanıcı Adı" required>
                <input type="password" id="sifre" placeholder="Şifre" required>
                <button type="submit" id="submitButon">Giriş Yap</button>
            </form>
        </div>
    </div>

    <!-- PANELİ ÇALIŞTIRAN JAVASCRIPT KODLARI -->
    <script>
        var modal = document.getElementById("authModal");
        var baslik = document.getElementById("modalBaslik");
        var buton = document.getElementById("submitButon");

        // Paneli açan fonksiyon
        function paneliAc(tip) {
            modal.style.display = "block";
            if(tip === 'giris') {
                baslik.innerText = "Giriş Yap";
                buton.innerText = "Giriş Yap";
            } else {
                baslik.innerText = "Kayıt Ol";
                buton.innerText = "Kayıt Ol";
            }
        }

        // Paneli kapatan fonksiyon
        function paneliKapat() {
            modal.style.display = "none";
        }

        // Dışarı tıklayınca kapatma
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // Form gönderildiğinde çalışacak kısım
        function formuGonder(event) {
            event.preventDefault();
            var isim = document.getElementById("kullaniciAdi").value;
            alert("Hoş geldin, " + isim + "! Başarıyla işlem yapıldı.");
            paneliKapat();
        }
    </script>

</body>
</html>
