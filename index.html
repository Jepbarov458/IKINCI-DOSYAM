<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarhatTube - Reklamsız Deneyim</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .header {
            display: flex; /* Hata düzeltildi: displays -> display */
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: #000;
            border-bottom: 2px solid red;
        }
        .logo {
            font-size: 24px;
            font-weight: bold; /* Hata düzeltildi: virgül -> noktalı virgül */
            color: red;
        }
        .auth-buttons button {
            background-color: red;
            color: white;
            border: none;
            padding: 8px 16px;
            margin-left: 10px;
            cursor: pointer; /* Buton olduğu anlaşılsın diye tıklama efekti eklendi */
            border-radius: 4px; /* Şık durması için hafif oval köşe eklendi */
        }
    </style>
</head>
<body>

    <!-- Örnek Header Yapısı (Eğer HTML kısmını eklemediysen diye) -->
    <div class="header">
        <div class="logo">FarhatTube</div>
        <div class="auth-buttons">
            <button>Giriş Yap</button>
            <button>Kayıt Ol</button>
        </div>
    </div>

</body>
</html>
